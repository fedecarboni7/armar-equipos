# Deploy to Railway production when a new version tag is pushed.
#
# Required setup:
# 1. Create a Railway deploy token and add it as RAILWAY_TOKEN secret in GitHub repo settings
# 2. Add RAILWAY_SERVICE_ID secret with the Railway service ID
# 3. Disable auto-deploy from master in Railway dashboard to avoid duplicate deploys

name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite://"
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      CRON_SECRET_TOKEN: ${{ secrets.CRON_SECRET_TOKEN }}
      PYTEST_RUNNING: "1"

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest -v

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Railway CLI
      run: npm i -g @railway/cli
    - name: Deploy to Railway
      run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }}
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
